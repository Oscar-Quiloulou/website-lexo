<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Chat IA - EduGame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
  <link rel="stylesheet" href="/src/styles/chat.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>
<body>
  <header id="navbar"></header>

  <main class="page page-chat">
    <h1>Chat avec l’IA</h1>
    <div class="chat-container">
      <div id="chat-messages" class="chat-messages"></div>

      <form id="chat-form" class="chat-input">
        <input type="text" id="chat-input-text" placeholder="Pose ta question..." autocomplete="off" />
        <button type="submit" class="btn primary">Envoyer</button>
      </form>
    </div>

    <section class="ads-section">
      <div id="ad-banner-chat" class="ad-banner"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <script src="/src/core/utils.js" type="module"></script>
  <script src="/src/core/ads.js" type="module"></script>
  <script src="/src/components/navbar.js" type="module"></script>
  <script src="/src/components/footer.js" type="module"></script>

  <script type="module">
    import { renderAdBanner } from '/src/components/adBanner.js';
    import { chatWithAI } from '/src/core/api.js';

    renderAdBanner('ad-banner-chat');

    const form = document.getElementById('chat-form');
    const input = document.getElementById('chat-input-text');
    const messages = document.getElementById('chat-messages');

    function addMessage(text, from = 'user') {
      const div = document.createElement('div');
      div.className = 'chat-message ' + from;
      div.innerHTML = marked.parse(text);
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      addMessage('L’IA réfléchit...', 'ai pending');
      const pending = messages.querySelector('.chat-message.pending');

      const reply = await chatWithAI(text);

      if (pending) pending.remove();
      addMessage(reply || 'Erreur lors de la réponse.', 'ai');
    });
  </script>
</body>
</html>
