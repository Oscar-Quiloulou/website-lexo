<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Boost pub - EduGame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
</head>
<body>
  <header id="navbar"></header>

  <main class="page page-ads">
    <h1>Activer un boost pub</h1>
    <p>Pendant 1 mois : 3× plus de pubs, puis 1 mois sans aucune pub.</p>

    <section class="payment-info">
      <p>Tu peux intégrer ici un système de paiement externe (crypto, etc.).</p>
      <button id="activate-boost-btn" class="btn primary">Simuler l’activation du boost</button>
    </section>

    <section class="ads-section">
      <div id="ad-banner-boost" class="ad-banner"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <script src="/src/core/user.js" type="module"></script>
  <script src="/src/core/vip.js" type="module"></script>
  <script src="/src/core/ads.js" type="module"></script>
  <script src="/src/components/navbar.js" type="module"></script>
  <script src="/src/components/footer.js" type="module"></script>
  <script type="module">
    import { renderAdBanner } from '/src/components/adBanner.js';
    import { getCurrentUser, saveUser } from '/src/core/user.js';
    import { activateBoostFor } from '/src/core/vip.js';

    renderAdBanner('ad-banner-boost');

    const btn = document.getElementById('activate-boost-btn');
    btn.addEventListener('click', () => {
      const user = getCurrentUser();
      if (!user) {
        alert('Tu dois être connecté.');
        window.location.href = '/src/pages/account/login.html';
        return;
      }
      activateBoostFor(user);
      saveUser(user);
      alert('Boost activé (simulation).');
      window.location.href = '/src/pages/account/profile.html';
    });
  </script>
</body>
</html>
