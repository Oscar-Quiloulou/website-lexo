<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Supprimer les pubs (VIP) - EduGame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
</head>
<body>
  <header id="navbar"></header>

  <main class="page page-ads">
    <h1>Passer en mode VIP</h1>
    <p>Plus aucune pub pendant la durée VIP.</p>

    <section class="payment-info">
      <p>Intègre ici ton système de paiement (A‑Ads, crypto, autre).</p>
      <button id="activate-vip-btn" class="btn primary">Simuler l’activation VIP</button>
    </section>

    <section class="ads-section">
      <div id="ad-banner-remove" class="ad-banner"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <script src="/src/core/user.js" type="module"></script>
  <script src="/src/core/vip.js" type="module"></script>
  <script src="/src/core/ads.js" type="module"></script>
  <script src="/src/components/navbar.js" type="module"></script>
  <script src="/src/components/footer.js" type="module"></script>
  <script type="module">
    import { renderAdBanner } from '/src/components/adBanner.js';
    import { getCurrentUser, saveUser } from '/src/core/user.js';
    import { activateVipFor } from '/src/core/vip.js';

    renderAdBanner('ad-banner-remove');

    const btn = document.getElementById('activate-vip-btn');
    btn.addEventListener('click', () => {
      const user = getCurrentUser();
      if (!user) {
        alert('Tu dois être connecté.');
        window.location.href = '/src/pages/account/login.html';
        return;
      }
      activateVipFor(user);
      saveUser(user);
      alert('VIP activé (simulation).');
      window.location.href = '/src/pages/account/profile.html';
    });
  </script>
</body>
</html>
