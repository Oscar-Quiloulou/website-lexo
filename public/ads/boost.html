<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <!-- 🔥 VARIABLES À CHANGER -->
  <script>
    const MODE = "boost";   // "boost" ou "vip"
    const TITRE = "Activer un boost pub";
    const DESCRIPTION = "Pendant 1 mois : 3× plus de pubs, puis 1 mois sans pub.";
  </script>

  <title id="page-title"></title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
</head>
<body>
  <header id="navbar"></header>

  <main class="page page-ads">
    <h1 id="titre-page"></h1>
    <p id="desc-page"></p>

    <section class="payment-info">
      <p>Intègre ici ton système de paiement (crypto, A‑Ads, etc.).</p>
      <button id="action-btn" class="btn primary"></button>
    </section>

    <section class="ads-section">
      <div id="ad-banner" class="ad-banner"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <!-- JS GLOBAL -->
  <script src="/src/core/user.js" type="module"></script>
  <script src="/src/core/vip.js" type="module"></script>
  <script src="/src/core/ads.js" type="module"></script>
  <script src="/src/components/navbar.js" type="module"></script>
  <script src="/src/components/footer.js" type="module"></script>
  <script src="/src/components/adBanner.js" type="module"></script>

  <!-- 🔥 AUTO-CONFIG -->
  <script type="module">
    import { renderAdBanner } from "/src/components/adBanner.js";
    import { getCurrentUser, saveUser } from "/src/core/user.js";
    import { activateBoostFor, activateVipFor } from "/src/core/vip.js";

    // Titre dynamique
    document.getElementById("page-title").textContent = TITRE;
    document.getElementById("titre-page").textContent = TITRE;
    document.getElementById("desc-page").textContent = DESCRIPTION;

    // Bouton dynamique
    const btn = document.getElementById("action-btn");
    btn.textContent = MODE === "boost" ? "Activer le boost" : "Activer le VIP";

    // Pub dynamique
    renderAdBanner("ad-banner");

    // Action
    btn.addEventListener("click", () => {
      const user = getCurrentUser();
      if (!user) {
        alert("Tu dois être connecté.");
        window.location.href = "/account/login.html";
        return;
      }

      if (MODE === "boost") {
        activateBoostFor(user);
      } else {
        activateVipFor(user);
      }

      saveUser(user);

      alert(MODE === "boost" ? "Boost activé !" : "VIP activé !");
      window.location.href = "/account/profile.html";
    });
  </script>
</body>
</html>
