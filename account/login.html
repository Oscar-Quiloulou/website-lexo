<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Connexion - EduGame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
</head>
<body>
  <header id="navbar"></header>

  <main class="page page-account">
    <h1>Connexion</h1>

    <form id="login-form" class="auth-form">
      <label>Email
        <input type="email" id="login-email" required />
      </label>
      <label>Mot de passe
        <input type="password" id="login-password" required />
      </label>
      <button type="submit" class="btn primary">Se connecter</button>
      <p>Pas de compte ? <a href="/account/register.html">Créer un compte</a></p>
    </form>

    <section class="ads-section">
      <div id="ad-banner-login" class="ad-banner"></div>
    </section>
  </main>

  <footer id="footer"></footer>

  <script src="/src/core/user.js" type="module"></script>
  <script src="/src/core/ads.js" type="module"></script>
  <script src="/src/components/navbar.js" type="module"></script>
  <script src="/src/components/footer.js" type="module"></script>
  <script type="module">
    import { renderAdBanner } from '/src/components/adBanner.js';
    import { login } from '/src/core/auth.js';

    renderAdBanner('ad-banner-login');

    const form = document.getElementById('login-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const ok = await login(email, password);
      if (ok) {
        window.location.href = '/account/profile.html';
      } else {
        alert('Identifiants incorrects.');
      }
    });
  </script>
</body>
</html>
