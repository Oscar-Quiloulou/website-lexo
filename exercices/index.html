<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Exercices - EduGame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/theme.css" />
  <link rel="stylesheet" href="/src/styles/ads.css" />
  <link rel="stylesheet" href="/src/styles/exercices.css" />
</head>
<body>
  <header id="navbar"></header>

  <main class="page page-exercices">

    <h1>Exercices</h1>
    <p class="subtitle">Choisis ton niveau et ta matière pour commencer.</p>

    <div class="exo-selector">

      <div class="selector-block">
        <h2>Niveau</h2>
        <select id="niveau-select">
          <option value="">Sélectionner…</option>
          <option value="6e">6e</option>
          <option value="5e">5e</option>
          <option value="4e">4e</option>
          <option value="3e">3e</option>
        </select>
      </div>

      <div class="selector-block">
        <h2>Matière</h2>
        <select id="matiere-select">
          <option value="">Sélectionner…</option>
          <option value="maths">Mathématiques</option>
          <option value="francais">Français</option>
          <option value="histoire">Histoire</option>
          <option value="geo">Géographie</option>
          <option value="anglais">Anglais</option>
          <option value="svt">SVT</option>
          <option value="physique">Physique-Chimie</option>
        </select>
      </div>

      <button id="start-btn" class="btn primary">Commencer</button>

    </div>

    <section class="ads-section">
      <div id="ad-banner-exo" class="ad-banner"></div>
    </section>

  </main>

  <footer id="footer"></footer>

  <script src="/src/components/navbar.js" type="module"></script>
  <script src="/src/components/footer.js" type="module"></script>
  <script src="/src/core/ads.js" type="module"></script>

  <script type="module">
    import { renderAdBanner } from "/src/components/adBanner.js";
    renderAdBanner("ad-banner-exo");

    const niveau = document.getElementById("niveau-select");
    const matiere = document.getElementById("matiere-select");
    const startBtn = document.getElementById("start-btn");

    startBtn.addEventListener("click", () => {
      if (!niveau.value || !matiere.value) {
        alert("Choisis un niveau et une matière.");
        return;
      }

      // Redirection vers la page d'exercice correspondante
      window.location.href = `/exercices/${niveau.value}/${matiere.value}.html`;
    });
  </script>

</body>
</html>
